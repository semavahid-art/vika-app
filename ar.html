<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Куб</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .header {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6);
            color: white; padding: 15px; text-align: center; font-family: sans-serif;
            font-weight: bold; font-size: 16px; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="header">👸🏼❤️👦🏻 Наведи камеру на маркер «Hiro»!</div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
        
        <a-assets>
            <img id="photo1" src="https://i.postimg.cc/DmKMmvPB/photo-1-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo2" src="https://postimg.cc/bZKRMg66][img]https://i.postimg.cc/bZKRMg66/photo-2-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo3" src="https://postimg.cc/GTcKKpMc][img]https://i.postimg.cc/GTcKKpMc/photo-3-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo4" src="https://postimg.cc/wtLkdNZx][img]https://i.postimg.cc/wtLkdNZx/photo-4-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo5" src="https://postimg.cc/7ft91wS4][img]https://i.postimg.cc/7ft91wS4/photo-5-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo6" src="https://postimg.cc/zbNFDBYw][img]https://i.postimg.cc/zbNFDBYw/photo-6-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
        </a-assets>

        <a-marker preset="hiro">
            <a-box position="0 1 0" material="src: #photo1; side: double; opacity: 0.9;" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                <a-entity material="src: #photo2;" geometry="primitive: plane; width: 1; height: 1;" position="0 0 0.501"></a-entity>
                <a-entity material="src: #photo3;" geometry="primitive: plane; width: 1; height: 1;" position="0 0 -0.501" rotation="0 180 0"></a-entity>
                <a-entity material="src: #photo4;" geometry="primitive: plane; width: 1; height: 1;" position="0.501 0 0" rotation="0 90 0"></a-entity>
                <a-entity material="src: #photo5;" geometry="primitive: plane; width: 1; height: 1;" position="-0.501 0 0" rotation="0 -90 0"></a-entity>
                <a-entity material="src: #photo6;" geometry="primitive: plane; width: 1; height: 1;" position="0 0.501 0" rotation="-90 0 0"></a-entity>
                <a-entity material="src: #photo1;" geometry="primitive: plane; width: 1; height: 1;" position="0 -0.501 0" rotation="90 0 0"></a-entity>
            </a-box>
            <a-torus-knot color="#D63384" position="0 1 0" arc="360" p="3" q="7" radius="1.3" radius-tubular="0.01" animation="property: rotation; to: 360 0 0; loop: true; dur: 8000; easing: linear"></a-torus-knot>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
