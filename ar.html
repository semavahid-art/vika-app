<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Куб: Сёма & Вика</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Стили для размещения AR поверх веб-интерфейса */
        body { margin: 0; overflow: hidden; }
        a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Верхний заголовок */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6);
            color: white; padding: 15px; text-align: center; font-family: sans-serif;
            font-weight: bold; font-size: 16px; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="header">👸🏼❤️👦🏻 Наведи камеру на маркер «Hiro»!</div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10; smoothThreshold: 2;'>
        
        <a-assets>
            <img id="photo1" src="https://i.postimg.cc/DmKMmvPB/photo-1-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo2" src="https://i.postimg.cc/bZKRMg66/photo-2-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo3" src="https://i.postimg.cc/GTcKKpMc/photo-3-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo4" src="https://i.postimg.cc/wtLkdNZx/photo-4-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo5" src="https://i.postimg.cc/7ft91wS4/photo-5-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            <img id="photo6" src="https://i.postimg.cc/zbNFDBYw/photo-6-2026-02-28-17-22-30.jpg" crossorigin="anonymous">
            
            <img id="heart-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Heart_coraz%C3%B3n.svg/512px-Heart_coraz%C3%B3n.svg.png" crossorigin="anonymous">
        </a-assets>

        <a-marker preset="hiro" smooth="true" smoothCount="10" smoothThreshold="5">
            
            <a-box position="0 1 0" material="src: #photo1; side: double; opacity: 0.95; filtering: anisotropic; anisotropicFiltering: 16; mipmap: true;" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                <a-entity material="src: #photo2; filtering: anisotropic;" geometry="primitive: plane; width: 1; height: 1;" position="0 0 0.501"></a-entity>
                <a-entity material="src: #photo3; filtering: anisotropic;" geometry="primitive: plane; width: 1; height: 1;" position="0 0 -0.501" rotation="0 180 0"></a-entity>
                <a-entity material="src: #photo4; filtering: anisotropic;" geometry="primitive: plane; width: 1; height: 1;" position="0.501 0 0" rotation="0 90 0"></a-entity>
                <a-entity material="src: #photo5; filtering: anisotropic;" geometry="primitive: plane; width: 1; height: 1;" position="-0.501 0 0" rotation="0 -90 0"></a-entity>
                <a-entity material="src: #photo6; filtering: anisotropic;" geometry="primitive: plane; width: 1; height: 1;" position="0 0.501 0" rotation="-90 0 0"></a-entity>
                <a-entity material="src: #photo1; filtering: anisotropic;" geometry="primitive: plane; width: 1; height: 1;" position="0 -0.501 0" rotation="90 0 0"></a-entity>
            </a-box>

            <a-entity position="0 1 0" animation="property: rotation; to: 0 -360 0; loop: true; dur: 9000; easing: linear">
                <a-plane position="0 0 1.5" material="src: #heart-img; transparent: true; alphaTest: 0.5;" geometry="primitive: plane; width: 0.6; height: 0.6;"></a-plane>
                <a-plane position="0 0 -1.5" rotation="0 180 0" material="src: #heart-img; transparent: true; alphaTest: 0.5;" geometry="primitive: plane; width: 0.6; height: 0.6;"></a-plane>
                <a-plane position="1.5 0 0" rotation="0 90 0" material="src: #heart-img; transparent: true; alphaTest: 0.5;" geometry="primitive: plane; width: 0.6; height: 0.6;"></a-plane>
                <a-plane position="-1.5 0 0" rotation="0 -90 0" material="src: #heart-img; transparent: true; alphaTest: 0.5;" geometry="primitive: plane; width: 0.6; height: 0.6;"></a-plane>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
