<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Вики</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://i.postimg.cc/HnQ64z0y/Funky-Beehive-Collage-Blank.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; color: #d63384; overflow: hidden; position: relative;
            touch-action: none; /* Запрет зума и скролла на телефоне */
        }

        .particle {
            position: absolute; background: white; border-radius: 50%;
            pointer-events: none; opacity: 0; z-index: 1; animation: blink 3s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .container {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3);
            text-align: center; width: 90%; max-width: 360px; z-index: 10;
        }

        .heart { font-size: 45px; animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        #timer { font-size: 19px; font-weight: 800; margin: 10px 0; color: #444; letter-spacing: 0.5px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: #d63384; color: white; border: none; padding: 10px 5px;
            border-radius: 12px; font-weight: bold; font-size: 13px; transition: 0.3s; cursor: pointer;
        }
        .btn-full { grid-column: span 2; background: #ff4d6d !important; padding: 14px; font-size: 15px; }
        .btn-game { grid-column: span 2; background: #8e44ad !important; padding: 14px; font-size: 15px; margin-top: 5px;}
        button:active { transform: scale(0.9); }

        #compliment-box {
            margin-top: 15px; padding: 10px; background: rgba(214, 51, 132, 0.1);
            border-radius: 15px; font-size: 13px; font-style: italic; min-height: 40px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .floating-heart {
            position: fixed; pointer-events: none; z-index: 9999;
            animation: fly 1.5s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tw-x)), calc(-50% + var(--tw-y))) scale(1.5); opacity: 0; }
        }
        .big-kiss {
            position: fixed; top: 50%; left: 50%; z-index: 10000;
            pointer-events: none; animation: kissAnim 0.8s ease-out forwards;
        }
        @keyframes kissAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* --- СТИЛИ ИГРЫ ВО ВЕСЬ ЭКРАН --- */
        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(#87CEEB, #e0f6ff); z-index: 9990;
            touch-action: none; overflow: hidden;
        }
        #game-area {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; 
        }
        .ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20vh;
            background: #4CAF50; border-top: 8px solid #fff; z-index: 1;
        }
        
        .sprite { position: absolute; bottom: 20vh; z-index: 3; display: flex; justify-content: center; }
        
        /* Сборные персонажи с телами */
        .character {
            display: flex; flex-direction: column; align-items: center; 
            transform-origin: bottom center; transition: transform 0.4s ease;
        }
        .head { font-size: 50px; line-height: 50px; z-index: 3; position: relative; }
        .body { width: 24px; height: 30px; border-radius: 12px; z-index: 2; margin-top: -8px; position: relative; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2); }
        .legs { display: flex; gap: 8px; z-index: 1; margin-top: -4px; }
        .leg { width: 8px; height: 24px; border-radius: 4px; transform-origin: top center; }

        /* Анимация бега ножками */
        .running .leg-l { animation: runLeg 0.3s infinite alternate linear; }
        .running .leg-r { animation: runLeg 0.3s infinite alternate-reverse linear; }
        @keyframes runLeg {
            0% { transform: rotate(30deg); }
            100% { transform: rotate(-30deg); }
        }
        .running { animation: runWobble 0.3s infinite linear; }
        @keyframes runWobble {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(4deg); }
            75% { transform: translateY(-3px) rotate(-4deg); }
        }

        /* Анимация поцелуя */
        .lean-right { transform: translateX(12px) rotate(18deg) !important; }
        .lean-left { transform: translateX(-12px) rotate(-18deg) !important; }
        
        @keyframes miniHeartFly {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
        }

        #syoma { left: 10%; }
        #vika { left: 100%; display: none; }
        .obstacle { position: absolute; bottom: 20vh; font-size: 45px; line-height: 45px; z-index: 2; }
        
        #instruction {
            position: absolute; top: 10vh; width: 100%; text-align: center;
            font-size: 24px; color: #333; font-weight: 900; text-shadow: 2px 2px 4px white; z-index: 5;
        }
        .close-game {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5);
            border: none; color: white; padding: 12px 15px; border-radius: 50%; font-size: 18px; z-index: 10000;
            pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">💖</div>
        <h1 style="font-size: 20px; margin: 5px 0;">Вика, мы вместе:</h1>
        <div id="timer">Загрузка...</div>
        
        <div class="btn-grid">
            <button onclick="sendMsg('Обнимаю тебя! 🤗')">Обнять 🤗</button>
            <button onclick="sendMsg('Очень скучаю... 🥺')">Скучаю 🥺</button>
            <button onclick="sendMsg('Люблю тебя! ❤️')">Люблю ❤️</button>
            <button onclick="sendMsg('Позвони мне? 📞')">Звонок 📞</button>
            <button class="btn-full" onclick="sendKiss()">КИДАТЬ БУСЬКУ 💋</button>
            <button class="btn-game" onclick="startGame()">🏃‍♂️ Сёма бежит к Вике (Игра)</button>
        </div>
        <div id="compliment-box" onclick="changePhrase()">Нажми, чтобы получить комплимент ✨</div>
    </div>

    <div id="game-overlay">
        <button class="close-game" id="close-btn">❌</button>
        <div id="game-area">
            <div class="ground"></div>
            <div id="instruction">Тапай по экрану, чтобы прыгать!</div>
            
            <div id="syoma" class="sprite">
                <div id="syoma-inner" class="character">
                    <div class="head">👨🏻</div>
                    <div class="body" style="background:#2980b9;"></div>
                    <div class="legs">
                        <div class="leg leg-l" style="background:#2c3e50;"></div>
                        <div class="leg leg-r" style="background:#2c3e50;"></div>
                    </div>
                </div>
            </div>

            <div id="vika" class="sprite">
                <div id="vika-inner" class="character" style="transform: rotate(-5deg);">
                    <div class="head">👩🏻</div>
                    <div class="body" style="background:#e74c3c;"></div>
                    <div class="legs">
                        <div class="leg leg-l" style="background:#2c3e50;"></div>
                        <div class="leg leg-r" style="background:#2c3e50;"></div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); 

        const phrases = [
            "Ты — моё самое дорогое сокровище ✨",
            "Твоя улыбка — это чистый кайф 😍",
            "Самая красивая девочка в мире! ❤️",
            "Обожаю твой голос и смех 🌸",
            "Ты — мой личный сорт счастья 🌟",
            "Хочу быть рядом каждую секунду 🥰"
        ];

        function changePhrase() {
            const box = document.getElementById('compliment-box');
            box.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function createHeartEffect() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️','💖','💕','✨'][Math.floor(Math.random()*4)];
            heart.className = 'floating-heart';
            heart.style.left = '50%'; heart.style.top = '45%'; 
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * 150;
            heart.style.setProperty('--tw-x', (Math.cos(angle) * dist) + 'px');
            heart.style.setProperty('--tw-y', (Math.sin(angle) * dist) + 'px');
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }
