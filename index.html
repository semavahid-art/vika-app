<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Вики</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('https://i.postimg.cc/HnQ64z0y/Funky-Beehive-Collage-Blank.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            color: #d63384;
            overflow: hidden;
            position: relative;
        }

        /* Облака делаем более заметными для телефона */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            z-index: 2;
            pointer-events: none;
        }
        .cloud::after, .cloud::before {
            content: ''; position: absolute; background: inherit; border-radius: 50%;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* Для iPhone */
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 85%;
            max-width: 350px;
            position: relative;
            z-index: 10;
        }

        .heart { font-size: 50px; animation: beat 1.2s infinite; }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #timer { font-size: 20px; font-weight: bold; margin: 15px 0; color: #333; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            background: #d63384; color: white; border: none;
            padding: 12px 5px; border-radius: 15px; font-weight: bold;
            font-size: 14px; z-index: 20;
        }

        /* Сердечки теперь ВСЕГДА сверху всего */
        .floating-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            animation: fly 1.5s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tw-x)), calc(-50% + var(--tw-y))) scale(1.5); opacity: 0; }
        }

        @keyframes moveCloud {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }

        #compliment { margin-top: 15px; font-size: 13px; font-style: italic; color: #6a1b41; }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">💖</div>
        <h1>Вика, мы вместе уже:</h1>
        <div id="timer">Загрузка...</div>
        
        <div class="btn-grid">
            <button onclick="sendMsg('Хочу обнимашек! 🤗')">Обнять 🤗</button>
            <button onclick="sendMsg('Скучаю по тебе... 🥺')">Скучаю 🥺</button>
            <button onclick="sendMsg('Люблю тебя сильно! ❤️')">Люблю ❤️</button>
            <button onclick="sendMsg('Давай созвонимся? 📞')">Звонок 📞</button>
        </div>
        <div id="compliment"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        const phrases = ["Ты — моё счастье ✨", "Самая любимая ❤️", "Моя вселенная 🌟", "Обожаю твою улыбку 😊"];
        document.getElementById('compliment').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        // Исправленная функция сердечек для телефона
        function createHeartEffect() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            
            // Центрируем относительно экрана
            heart.style.left = '50%';
            heart.style.top = '40%'; 
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * 150;
            heart.style.setProperty('--tw-x', (Math.cos(angle) * dist) + 'px');
            heart.style.setProperty('--tw-y', (Math.sin(angle) * dist) + 'px');
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        // Исправленные облака
        function createCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            const w = 60 + Math.random() * 60;
            cloud.style.width = w + 'px';
            cloud.style.height = (w * 0.6) + 'px';
            cloud.style.top = (Math.random() * 80) + 'vh';
            cloud.style.left = '-150px';
            
            const dur = 15 + Math.random() * 20;
            cloud.style.animation = `moveCloud ${dur}s linear forwards`;
            
            document.body.appendChild(cloud);
            setTimeout(() => cloud.remove(), dur * 1000);
        }

        function sendMsg(text) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            for (let i = 0; i < 8; i++) setTimeout(createHeartEffect, i * 50);
            tg.sendData(text);
        }

        const startDate = new Date(2023, 8, 26); 
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d}д. ${h}ч. ${m}м. ${s}с.`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
        setInterval(createCloud, 4000);

        // Запуск при старте
        window.onload = () => {
            for (let i = 0; i < 15; i++) setTimeout(createHeartEffect, i * 100);
            for (let i = 0; i < 4; i++) createCloud();
        };
    </script>
</body>
</html>
