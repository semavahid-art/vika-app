<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Вики</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://i.postimg.cc/HnQ64z0y/Funky-Beehive-Collage-Blank.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; color: #d63384; overflow: hidden; position: relative;
            touch-action: none; /* Отключаем свайпы и зум на телефоне */
        }

        /* Мерцающие частицы */
        .particle {
            position: absolute; background: white; border-radius: 50%;
            pointer-events: none; opacity: 0; z-index: 1;
            animation: blink 3s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .container {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3);
            text-align: center; width: 90%; max-width: 360px; z-index: 10;
        }

        .heart { font-size: 45px; animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        #timer { font-size: 19px; font-weight: 800; margin: 10px 0; color: #444; letter-spacing: 0.5px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: #d63384; color: white; border: none; padding: 10px 5px;
            border-radius: 12px; font-weight: bold; font-size: 13px; transition: 0.3s;
            cursor: pointer;
        }
        .btn-full { grid-column: span 2; background: #ff4d6d !important; padding: 14px; font-size: 15px; }
        .btn-game { grid-column: span 2; background: #8e44ad !important; padding: 14px; font-size: 15px; margin-top: 5px;}
        button:active { transform: scale(0.9); }

        #compliment-box {
            margin-top: 15px; padding: 10px; background: rgba(214, 51, 132, 0.1);
            border-radius: 15px; font-size: 13px; font-style: italic; min-height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .floating-heart {
            position: fixed; pointer-events: none; z-index: 9999;
            animation: fly 1.5s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tw-x)), calc(-50% + var(--tw-y))) scale(1.5); opacity: 0; }
        }

        .big-kiss {
            position: fixed; top: 50%; left: 50%; z-index: 10000;
            pointer-events: none; animation: kissAnim 0.8s ease-out forwards;
        }
        @keyframes kissAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* --- СТИЛИ ИГРЫ --- */
        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 9990; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); touch-action: none;
        }
        #game-area {
            position: relative; width: 100%; height: 50vh; background: linear-gradient(#87CEEB, #e0f6ff);
            border-top: 6px solid #fff; border-bottom: 25px solid #4CAF50; overflow: hidden;
            pointer-events: none; /* Отключаем клики внутри зоны, ловим на всем overlay */
        }
        
        .sprite { position: absolute; bottom: 0; font-size: 45px; line-height: 45px; z-index: 2; display: flex; justify-content: center; transform-origin: bottom center; }
        
        /* Анимация бега */
        .inner-sprite { display: inline-block; transform-origin: bottom center; }
        .running { animation: runWobble 0.4s infinite linear; }
        @keyframes runWobble {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(8deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-5px) rotate(-8deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Анимация поцелуя в конце */
        .lean-right { transform: translateX(10px) rotate(15deg) !important; transition: 0.3s; }
        .lean-left { transform: translateX(-10px) rotate(-15deg) !important; transition: 0.3s; }
        
        @keyframes miniHeartFly {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        #syoma { left: 15%; }
        #vika { left: 100%; display: none; }
        .obstacle { position: absolute; bottom: 0; font-size: 35px; line-height: 35px; z-index: 1; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 20px; color: #333; font-weight: 900; text-shadow: 1px 1px 2px white; z-index: 5;
        }
        .close-game {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5);
            border: none; color: white; padding: 10px 15px; border-radius: 50%; font-size: 16px; z-index: 10000;
            pointer-events: auto; /* Включаем клики только для крестика */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">💖</div>
        <h1 style="font-size: 20px; margin: 5px 0;">Вика, мы вместе:</h1>
        <div id="timer">Загрузка...</div>
        
        <div class="btn-grid">
            <button onclick="sendMsg('Обнимаю тебя! 🤗')">Обнять 🤗</button>
            <button onclick="sendMsg('Очень скучаю... 🥺')">Скучаю 🥺</button>
            <button onclick="sendMsg('Люблю тебя! ❤️')">Люблю ❤️</button>
            <button onclick="sendMsg('Позвони мне? 📞')">Звонок 📞</button>
            <button class="btn-full" onclick="sendKiss()">КИДАТЬ БУСЬКУ 💋</button>
            <button class="btn-game" onclick="startGame()">🏃‍♂️ Сёма бежит к Вике (Игра)</button>
        </div>
        <div id="compliment-box" onclick="changePhrase()">Нажми, чтобы получить комплимент ✨</div>
    </div>

    <div id="game-overlay">
        <button class="close-game" id="close-btn">❌</button>
        <div id="game-area">
            <div id="instruction">Тапай в любом месте экрана!</div>
            <div id="syoma" class="sprite"><div id="syoma-inner" class="inner-sprite">👨🏻</div></div>
            <div id="vika" class="sprite"><div id="vika-inner" class="inner-sprite">👩🏻</div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); 

        const phrases = [
            "Ты — моё самое дорогое сокровище ✨",
            "Твоя улыбка — это чистый кайф 😍",
            "Самая красивая девочка в мире! ❤️",
            "Обожаю твой голос и смех 🌸",
            "Ты — мой личный сорт счастья 🌟",
            "Хочу быть рядом каждую секунду 🥰"
        ];

        function changePhrase() {
            const box = document.getElementById('compliment-box');
            box.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function createHeartEffect() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️','💖','💕','✨'][Math.floor(Math.random()*4)];
            heart.className = 'floating-heart';
            heart.style.left = '50%'; heart.style.top = '45%'; 
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * 150;
            heart.style.setProperty('--tw-x', (Math.cos(angle) * dist) + 'px');
            heart.style.setProperty('--tw-y', (Math.sin(angle) * dist) + 'px');
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function sendKiss() {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            const kiss = document.createElement('div');
            kiss.innerHTML = '💋'; kiss.className = 'big-kiss';
            document.body.appendChild(kiss);
            setTimeout(() => kiss.remove(), 800);
            for (let i = 0; i < 12; i++) setTimeout(createHeartEffect, i * 40);
            try { tg.sendData('Поцелуй отправлен! 💋'); } catch(e) {}
        }

        function sendMsg(text) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            for (let i = 0; i < 6; i++) setTimeout(createHeartEffect, i * 60);
            try { tg.sendData(text); } catch(e) {}
        }

        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(p);
            }
        }

        const startDate = new Date(2023, 8, 26); 
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d}д. ${h}ч. ${m}м. ${s}с.`;
        }

        setInterval(updateTimer, 1000); updateTimer();
        createParticles();

        window.onload = () => {
            for (let i = 0; i < 10; i++) setTimeout(createHeartEffect, i * 100);
        };

        /* ================= ЛОГИКА ИГРЫ (ОПТИМИЗАЦИЯ ДЛЯ ТЕЛЕФОНОВ) ================= */
        let gameActive = false;
        let syomaY = 0;
        let velocityY = 0;
        const gravity = 0.6;      
        const jumpPower = 12.5; // Чуть сильнее прыжок, чтобы наверняка перелетать кактусы    
        let gameSpeed = 3.5;      
        let distance = 0;
        const finishDistance = 800; 
        let spawnTimer = 0;
        let reqId;
        let isFinishing = false;  

        const overlay = document.getElementById('game-overlay');
        const syomaEl = document.getElementById('syoma');
        const syomaInner = document.getElementById('syoma-inner');
        const vikaEl = document.getElementById('vika');
        const vikaInner = document.getElementById('vika-inner');
        const gameArea = document.getElementById('game-area');
        const closeBtn = document.getElementById('close-btn');

        function startGame() {
            overlay.style.display = 'flex';
            resetGame();
            gameActive = true;
            document.getElementById('instruction').innerText = "Тапай в любом месте экрана!";
            reqId = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            syomaY = 0; velocityY = 0; distance = 0; spawnTimer = 0; gameSpeed = 3.5;
            isFinishing = false;
            
            syomaEl.style.bottom = '0px';
            syomaInner.className = 'inner-sprite running'; 
            
            vikaEl.style.display = 'none';
            vikaEl.style.left = '100%';
            vikaInner.className = 'inner-sprite';
            
            document.querySelectorAll('.obstacle, .mini-heart').forEach(e => e.remove());
        }

        // ГЛОБАЛЬНЫЙ обработчик тапов для телефона
        function handleTap(e) {
            // Игнорируем нажатие, если кликнули на крестик
            if (e.target === closeBtn) return;
            e.preventDefault(); 
            
            if (!gameActive || isFinishing) return;
            
            // Если мы на земле (или почти на земле - защита от багов физики)
            if (syomaY <= 1) { 
                velocityY = jumpPower;
                syomaInner.classList.remove('running'); 
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Вешаем события на весь черный фон
        overlay.addEventListener('touchstart', handleTap, { passive: false });
        overlay.addEventListener('mousedown', handleTap);

        closeBtn.addEventListener('click', stopGame);
        closeBtn.addEventListener('touchstart', stopGame, { passive: false });

        function stopGame(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            gameActive = false;
            cancelAnimationFrame(reqId);
            overlay.style.display = 'none';
        }

        function gameLoop() {
            if (!gameActive) return;

            // 1. Физика прыжка
            syomaY += velocityY;
            velocityY -= gravity;
            
            // Приземление
            if (syomaY <= 0) { 
                if (syomaY < 0 && !isFinishing) syomaInner.classList.add('running'); 
                syomaY = 0; 
                velocityY = 0; 
            }
            syomaEl.style.bottom = syomaY + 'px';

            if (!isFinishing) {
                distance += gameSpeed;
                gameSpeed += 0.001; 
            }

            // 2. Спавн препятствий
            if (distance < finishDistance && !isFinishing) {
                spawnTimer++;
                if (spawnTimer > 90 + Math.random() * 60) {
                    const obs = document.createElement('div');
                    obs.className = 'obstacle';
                    obs.innerText = ['🌵','🪨'][Math.floor(Math.random()*2)];
                    obs.style.left = gameArea.offsetWidth + 'px';
                    gameArea.appendChild(obs);
                    spawnTimer = 0;
                }
            }

            // 3. Движение препятствий и проверка столкновений
            let hit = false;
            const syomaRect = syomaEl.getBoundingClientRect();

            document.querySelectorAll('.obstacle').forEach(obs => {
                let currentLeft = parseFloat(obs.style.left);
                currentLeft -= gameSpeed;
                obs.style.left = currentLeft + 'px';

                const obsRect = obs.getBoundingClientRect();
                // Уменьшенный (прощающий) хитбокс специально для мобильных экранов
                if (
                    syomaRect.right - 20 > obsRect.left &&
                    syomaRect.left + 20 < obsRect.right &&
                    syomaRect.bottom > obsRect.top + 20
                ) {
                    hit = true;
                }

                if (currentLeft < -50) obs.remove();
            });

            if (hit && !isFinishing) {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                gameActive = false;
                syomaInner.classList.remove('running');
                document.getElementById('instruction').innerText = "Ой, споткнулся! 🥺";
                setTimeout(() => { if (overlay.style.display === 'flex') startGame(); }, 1500);
                return;
            }

            // 4. Финал! Сёма добегает до Вики
            if (distance >= finishDistance) {
                vikaEl.style.display = 'block';
                let vikaLeft = parseFloat(vikaEl.style.left) || gameArea.offsetWidth;
                
                if (vikaLeft > gameArea.offsetWidth * 0.7) {
                    vikaEl.style.left = (vikaLeft - gameSpeed) + 'px';
                } else {
                    isFinishing = true;
                    // Сёма бежит к ней по центру
                    let sRect = syomaEl.getBoundingClientRect();
                    let vRect = vikaEl.getBoundingClientRect();
                    
                    if (sRect.right < vRect.left + 5) {
                        syomaEl.style.left = (parseFloat(syomaEl.style.left || 15) + 3) + 'px';
                    } else if (gameActive) {
                        gameActive = false; 
                        syomaInner.classList.remove('running');
                        document.getElementById('instruction').innerText = "ЛЮБЛЮ ТЕБЯ! ❤️";
                        
                        // Анимация поцелуя
                        syomaInner.className = 'inner-sprite lean-right';
                        vikaInner.className = 'inner-sprite lean-left';

                        const miniHeart = document.createElement('div');
                        miniHeart.className = 'mini-heart';
                        miniHeart.innerText = '💗';
                        miniHeart.style.position = 'absolute';
                        miniHeart.style.left = (parseFloat(vikaEl.style.left) - 15) + 'px';
                        miniHeart.style.bottom = '40px';
                        miniHeart.style.fontSize = '30px';
                        miniHeart.style.animation = 'miniHeartFly 1s ease-out forwards';
                        gameArea.appendChild(miniHeart);

                        setTimeout(() => {
                            stopGame();
                            sendKiss();
                            try { tg.sendData("Сёма преодолел все преграды и поцеловал Вику! 🏃‍♂️❤️👩🏻"); } catch(e){}
                        }, 1200);
                        return;
                    }
                }
            }

            reqId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
