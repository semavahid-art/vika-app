<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Вики</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('https://i.postimg.cc/HnQ64z0y/Funky-Beehive-Collage-Blank.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #d63384;
            overflow: hidden;
            position: relative; /* Нужно для позиционирования облаков */
        }

        /* --- НОВЫЕ СТИЛИ ДЛЯ ОБЛАКОВ --- */
        .clouds-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1; /* Облака за контейнером */
            pointer-events: none; /* Чтобы не мешали кликам */
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.6); /* Полупрозрачный белый */
            border-radius: 50px;
            animation: moveCloud linear infinite;
        }

        /* "Кучевые" части облака */
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        /* Анимация движения */
        @keyframes moveCloud {
            from { left: -150px; } /* Уходим за левый край */
            to { left: 100%; }    /* Уходим за правый край */
        }
        /* ---------------------------------- */

        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            max-width: 350px;
            position: relative;
            z-index: 5; /* Контейнер поверх облаков */
        }
        .heart { font-size: 50px; animation: beat 1.2s infinite; position: relative; z-index: 6; }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #timer { font-size: 20px; font-weight: bold; margin: 15px 0; color: #333; }
        h1 { font-size: 22px; margin: 10px 0; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button {
            background: #d63384; color: white; border: none;
            padding: 12px 5px; border-radius: 15px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 14px;
            position: relative;
            z-index: 10;
        }
        button:active { transform: scale(0.9); }
        
        .floating-heart {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            top: 50%;
            left: 50%;
            font-size: 20px;
            animation: fly 1.5s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tw-x), var(--tw-y)) scale(1.5); opacity: 0; }
        }

        #compliment {
            margin-top: 20px;
            font-size: 13px;
            font-style: italic;
            color: #6a1b41;
            min-height: 32px;
        }
    </style>
</head>
<body>
    <div class="clouds-container" id="clouds"></div>

    <div class="container">
        <div class="heart" id="main-heart">💖</div>
        <h1>Вика, мы вместе уже:</h1>
        <div id="timer">Загрузка...</div>
        
        <div class="btn-grid">
            <button onclick="sendMsg('Хочу обнимашек! 🤗')">Обнять 🤗</button>
            <button onclick="sendMsg('Скучаю по тебе... 🥺')">Скучаю 🥺</button>
            <button onclick="sendMsg('Люблю тебя сильно! ❤️')">Люблю ❤️</button>
            <button onclick="sendMsg('Давай созвонимся? 📞')">Звонок 📞</button>
        </div>

        <div id="compliment"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        const phrases = [
            "Ты — самое лучшее, что со мной случилось ✨",
            "Твоя улыбка — мой любимый вид искусства 🎨",
            "Обожаю тебя с каждым днём всё сильнее ❤️",
            "Ты делаешь мой мир ярче просто тем, что ты есть 🌟",
            "Моя любимая девочка 🌸"
        ];
        document.getElementById('compliment').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        // --- ФУНКЦИИ ДЛЯ ОБЛАКОВ ---
        function createCloud() {
            const container = document.getElementById('clouds');
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            
            // Случайные размеры
            const w = 30 + Math.random() * 100;
            const h = w * 0.6;
            cloud.style.width = w + 'px';
            cloud.style.height = h + 'px';
            
            // "Пузыри" облака
            const after = document.createElement('div');
            after.style.width = (w*0.5)+'px'; after.style.height = (w*0.5)+'px';
            after.style.top = `-${w*0.25}px`; after.style.left = `${w*0.1}px`;
            after.style.position = 'absolute'; after.style.background = 'inherit'; after.style.borderRadius='50%';
            cloud.appendChild(after);

            const before = document.createElement('div');
            before.style.width = (w*0.4)+'px'; before.style.height = (w*0.4)+'px';
            before.style.top = `-${w*0.15}px`; before.style.right = `${w*0.15}px`;
            before.style.position = 'absolute'; before.style.background = 'inherit'; before.style.borderRadius='50%';
            cloud.appendChild(before);
            
            // Случайная позиция по вертикали и скорость
            cloud.style.top = Math.random() * 100 + 'vh';
            const duration = 15 + Math.random() * 30; // 15-45 секунд
            cloud.style.animationDuration = duration + 's';
            
            container.appendChild(cloud);
            
            // Удаляем облако после пролета
            setTimeout(() => cloud.remove(), duration * 1000);
        }

        // Запускаем бесконечное создание облаков
        setInterval(createCloud, 3000); // Новое облако каждые 3 сек
        for(let i=0; i<5; i++) createCloud(); // Создать сразу несколько при старте
        // ---------------------------

        function createHeartEffect() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 150;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;
            heart.style.setProperty('--tw-x', `${x}px`);
            heart.style.setProperty('--tw-y', `${y}px`);
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function sendMsg(text) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            for (let i = 0; i < 8; i++) setTimeout(createHeartEffect, i * 50);
            tg.sendData(text);
        }

        const startDate = new Date(2023, 8, 26); 
        
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${days}д. ${hours}ч. ${mins}м. ${secs}с.`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        window.onload = () => {
            for (let i = 0; i < 15; i++) {
                setTimeout(createHeartEffect, i * 100);
            }
        };
    </script>
</body>
</html>
