<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Вики</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('https://i.postimg.cc/HnQ64z0y/Funky-Beehive-Collage-Blank.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #d63384;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            max-width: 350px;
            position: relative;
        }
        .heart { font-size: 50px; animation: beat 1.2s infinite; }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #timer { font-size: 20px; font-weight: bold; margin: 15px 0; color: #333; }
        h1 { font-size: 22px; margin: 10px 0; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button {
            background: #d63384; color: white; border: none;
            padding: 12px 5px; border-radius: 15px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 14px;
            z-index: 2;
        }
        button:active { transform: scale(0.9); }
        
        /* Стиль для вылетающих сердечек */
        .floating-heart {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            animation: fly 1.5s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) translateX(var(--random-x)) scale(0.5); opacity: 0; }
        }

        #compliment {
            margin-top: 20px;
            font-size: 13px;
            font-style: italic;
            color: #6a1b41;
            min-height: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💖</div>
        <h1>Вика, мы вместе уже:</h1>
        <div id="timer">Загрузка...</div>
        
        <div class="btn-grid">
            <button onclick="sendMsg('Хочу обнимашек! 🤗')">Обнять 🤗</button>
            <button onclick="sendMsg('Скучаю по тебе... 🥺')">Скучаю 🥺</button>
            <button onclick="sendMsg('Люблю тебя сильно! ❤️')">Люблю ❤️</button>
            <button onclick="sendMsg('Давай созвонимся? 📞')">Звонок 📞</button>
        </div>

        <div id="compliment"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        // Список фраз (можно дополнять)
        const phrases = [
            "Ты — самое лучшее, что со мной случилось ✨",
            "Твоя улыбка — мой любимый вид искусства 🎨",
            "Обожаю тебя с каждым днём всё сильнее ❤️",
            "Ты делаешь мой мир ярче просто тем, что ты есть 🌟",
            "Моя любимая девочка 🌸"
        ];
        document.getElementById('compliment').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        function sendMsg(text) {
            // Эффект вибрации
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Создаем эффект сердечек при клике
            for (let i = 0; i < 6; i++) {
                createHeartEffect();
            }

            tg.sendData(text);
        }

        function createHeartEffect() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            heart.style.left = '50%';
            heart.style.setProperty('--random-x', (Math.random() * 200 - 100) + 'px');
            document.querySelector('.container').appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        const startDate = new Date(2023, 8, 26); 
        
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60); // Добавили секунды

            const timerElement = document.getElementById('timer');
            if (timerElement) {
                timerElement.innerText = `${days}д. ${hours}ч. ${mins}м. ${secs}с.`;
            }
        }

        setInterval(updateTimer, 1000); // Теперь обновляем каждую секунду
        updateTimer();
    </script>
</body>
</html>
