<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей Вики</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://i.postimg.cc/HnQ64z0y/Funky-Beehive-Collage-Blank.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; color: #d63384; overflow: hidden; position: relative;
            touch-action: none; 
        }

        .particle {
            position: absolute; background: white; border-radius: 50%;
            pointer-events: none; opacity: 0; z-index: 1; animation: blink 3s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .container {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3);
            text-align: center; width: 90%; max-width: 360px; z-index: 10;
        }

        .heart { font-size: 45px; animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        #timer { font-size: 19px; font-weight: 800; margin: 10px 0; color: #444; letter-spacing: 0.5px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: #d63384; color: white; border: none; padding: 10px 5px;
            border-radius: 12px; font-weight: bold; font-size: 13px; transition: 0.3s; cursor: pointer;
        }
        .btn-full { grid-column: span 2; background: #ff4d6d !important; padding: 14px; font-size: 15px; }
        .btn-game { grid-column: span 2; background: #8e44ad !important; padding: 14px; font-size: 15px; margin-top: 5px;}
        button:active { transform: scale(0.9); }

        #compliment-box {
            margin-top: 15px; padding: 10px; background: rgba(214, 51, 132, 0.1);
            border-radius: 15px; font-size: 13px; font-style: italic; min-height: 40px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .floating-heart {
            position: fixed; pointer-events: none; z-index: 9999;
            animation: fly 1.5s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tw-x)), calc(-50% + var(--tw-y))) scale(1.5); opacity: 0; }
        }
        .big-kiss {
            position: fixed; top: 50%; left: 50%; z-index: 10000;
            pointer-events: none; animation: kissAnim 0.8s ease-out forwards;
        }
        @keyframes kissAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* --- СТИЛИ ИГРЫ ВО ВЕСЬ ЭКРАН (ОБНОВЛЕННЫЕ) --- */
        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(#87CEEB, #e0f6ff); z-index: 9990;
            touch-action: none; overflow: hidden;
        }
        #game-area {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; 
        }
        .ground {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20vh;
            background: #4CAF50; border-top: 8px solid #fff; z-index: 1;
        }
        
        .sprite { position: absolute; bottom: 20vh; z-index: 3; display: flex; justify-content: center; }
        
        /* Персонажи с телами и РУКАМИ */
        .character {
            display: flex; flex-direction: column; align-items: center; 
            transform-origin: bottom center; transition: transform 0.4s ease;
            position: relative;
        }
        .head { font-size: 50px; line-height: 50px; z-index: 4; position: relative; }
        .body { width: 24px; height: 32px; border-radius: 12px; z-index: 3; margin-top: -8px; position: relative; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2); }
        
        /* Руки */
        .arm { width: 8px; height: 24px; border-radius: 4px; position: absolute; top: 48px; z-index: 2; transform-origin: top center; }
        .arm-l { left: -6px; }
        .arm-r { right: -6px; }

        .legs { display: flex; gap: 8px; z-index: 1; margin-top: -4px; position: relative; }
        .leg { width: 8px; height: 24px; border-radius: 4px; transform-origin: top center; }

        /* Анимация бега: ноги и руки */
        .running .leg-l { animation: runMember 0.3s infinite alternate linear; }
        .running .leg-r { animation: runMember 0.3s infinite alternate-reverse linear; }
        .running .arm-l { animation: runMember 0.3s infinite alternate-reverse linear; }
        .running .arm-r { animation: runMember 0.3s infinite alternate linear; }

        @keyframes runMember {
            0% { transform: rotate(35deg); }
            100% { transform: rotate(-35deg); }
        }
        
        .running { animation: runWobble 0.3s infinite linear; }
        @keyframes runWobble {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-4px) rotate(5deg); }
            75% { transform: translateY(-4px) rotate(-5deg); }
        }

        /* Анимация поцелуя */
        .lean-right { transform: translateX(12px) rotate(18deg) !important; }
        .lean-left { transform: translateX(-12px) rotate(-18deg) !important; }
        
        @keyframes miniHeartFly {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-12px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.5); }
        }

        #syoma { left: 10%; }
        /* Вика БЛИЖЕ */
        #vika { left: 100%; display: none; }
        
        .obstacle { position: absolute; bottom: 20vh; font-size: 45px; line-height: 45px; z-index: 2; }
        
        #instruction {
            position: absolute; top: 10vh; width: 100%; text-align: center;
            font-size: 24px; color: #333; font-weight: 900; text-shadow: 2px 2px 4px white; z-index: 5;
        }
        .close-game {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5);
            border: none; color: white; padding: 12px 15px; border-radius: 50%; font-size: 18px; z-index: 10000;
            pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">💖</div>
        <h1 style="font-size: 20px; margin: 5px 0;">Вика, мы вместе:</h1>
        <div id="timer">Загрузка...</div>
        
        <div class="btn-grid">
            <button onclick="sendMsg('Обнимаю тебя! 🤗')">Обнять 🤗</button>
            <button onclick="sendMsg('Очень скучаю... 🥺')">Скучаю 🥺</button>
            <button onclick="sendMsg('Люблю тебя! ❤️')">Люблю ❤️</button>
            <button onclick="sendMsg('Позвони мне? 📞')">Звонок 📞</button>
            <button class="btn-full" onclick="sendKiss()">КИДАТЬ БУСЬКУ 💋</button>
            <button class="btn-game" onclick="startGame()">🏃‍♂️ Сёма бежит к Вике (Игра)</button>
        </div>
        <div id="compliment-box" onclick="changePhrase()">Нажми, чтобы получить комплимент ✨</div>
    </div>

    <div id="game-overlay">
        <button class="close-game" id="close-btn">❌</button>
        <div id="game-area">
            <div class="ground"></div>
            <div id="instruction">Тапай, чтобы прыгать через препятствия!</div>
            
            <div id="syoma" class="sprite">
                <div id="syoma-inner" class="character">
                    <div class="head">👨🏻</div>
                    <div class="arm arm-l" style="background:#2980b9;"></div>
                    <div class="arm arm-r" style="background:#2980b9;"></div>
                    <div class="body" style="background:#2980b9;"></div>
                    <div class="legs">
                        <div class="leg leg-l" style="background:#2c3e50;"></div>
                        <div class="leg leg-r" style="background:#2c3e50;"></div>
                    </div>
                </div>
            </div>

            <div id="vika" class="sprite">
                <div id="vika-inner" class="character" style="transform: rotate(-5deg);">
                    <div class="head">👩🏻</div>
                    <div class="arm arm-l" style="background:#e74c3c;"></div>
                    <div class="arm arm-r" style="background:#e74c3c;"></div>
                    <div class="body" style="background:#e74c3c;"></div>
                    <div class="legs">
                        <div class="leg leg-l" style="background:#2c3e50;"></div>
                        <div class="leg leg-r" style="background:#2c3e50;"></div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); 

        const phrases = [
            "Ты — моё самое дорогое сокровище ✨",
            "Твоя улыбка — это чистый кайф 😍",
            "Самая красивая девочка в мире! ❤️",
            "Обожаю твой голос и смех 🌸",
            "Ты — мой личный сорт счастья 🌟",
            "Хочу быть рядом каждую секунду 🥰"
        ];

        function changePhrase() {
            const box = document.getElementById('compliment-box');
            box.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function createHeartEffect() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️','💖','💕','✨'][Math.floor(Math.random()*4)];
            heart.className = 'floating-heart';
            heart.style.left = '50%'; heart.style.top = '45%'; 
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * 150;
            heart.style.setProperty('--tw-x', (Math.cos(angle) * dist) + 'px');
            heart.style.setProperty('--tw-y', (Math.sin(angle) * dist) + 'px');
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function sendKiss() {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            const kiss = document.createElement('div');
            kiss.innerHTML = '💋'; kiss.className = 'big-kiss';
            document.body.appendChild(kiss);
            setTimeout(() => kiss.remove(), 800);
            for (let i = 0; i < 12; i++) setTimeout(createHeartEffect, i * 40);
            try { tg.sendData('Поцелуй отправлен! 💋'); } catch(e) {}
        }

        function sendMsg(text) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            for (let i = 0; i < 6; i++) setTimeout(createHeartEffect, i * 60);
            try { tg.sendData(text); } catch(e) {}
        }

        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(p);
            }
        }

        const startDate = new Date(2023, 8, 26); 
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff / 3600000) % 24);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d}д. ${h}ч. ${m}м. ${s}с.`;
        }

        setInterval(updateTimer, 1000); updateTimer();
        createParticles();
        window.onload = () => { for (let i = 0; i < 10; i++) setTimeout(createHeartEffect, i * 100); };

        /* ================= ЛОГИКА ИГРЫ (ОПТИМИЗАЦИЯ ДЛЯ ТЕЛЕФОНОВ) ================= */
        let gameActive = false;
        let syomaY = 0;
        let velocityY = 0;
        const gravity = 0.8;      
        const jumpPower = 15;
        let gameSpeed = 5;      
        let distance = 0;
        // Более длинный уровень и Вика БЛИЖЕ
        const finishDistance = 2500; 
        const vikaAppearDist = 0.65; // Вика появится на 65% пути
        let spawnTimer = 0;
        let reqId;
        let isFinishing = false;  

        const overlay = document.getElementById('game-overlay');
        const syomaEl = document.getElementById('syoma');
        const syomaInner = document.getElementById('syoma-inner');
        const vikaEl = document.getElementById('vika');
        const vikaInner = document.getElementById('vika-inner');
        const gameArea = document.getElementById('game-area');
        const closeBtn = document.getElementById('close-btn');

        function startGame() {
            try { tg.requestFullscreen(); } catch(e) {}
            overlay.style.display = 'flex';
            resetGame();
            gameActive = true;
            document.getElementById('instruction').innerText = "Тапай, чтобы прыгать!";
            reqId = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            syomaY = 0; velocityY = 0; distance = 0; spawnTimer = 0; gameSpeed = 5;
            isFinishing = false;
            
            syomaEl.style.bottom = '20vh';
            syomaInner.className = 'character running'; 
            
            vikaEl.style.display = 'none';
            vikaEl.style.left = '100%';
            vikaInner.className = 'character';
            vikaInner.style.transform = 'rotate(-5deg)';
            
            document.querySelectorAll('.obstacle, .mini-heart').forEach(e => e.remove());
        }

        function handleTap(e) {
            if (e.target === closeBtn) return;
            e.preventDefault(); 
            if (!gameActive || isFinishing) return;
            
            if (syomaY <= 1) { 
                velocityY = jumpPower;
                syomaInner.classList.remove('running');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }

        overlay.addEventListener('touchstart', handleTap, { passive: false });
        overlay.addEventListener('mousedown', handleTap);

        closeBtn.addEventListener('click', stopGame);
        closeBtn.addEventListener('touchstart', stopGame, { passive: false });

        function stopGame(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            gameActive = false;
            cancelAnimationFrame(reqId);
            overlay.style.display = 'none';
        }

        function gameLoop() {
            if (!gameActive) return;

            // 1. Физика прыжка
            syomaY += velocityY;
            velocityY -= gravity;
            
            if (syomaY <= 0) { 
                if (syomaY < 0 && !isFinishing) syomaInner.classList.add('running'); 
                syomaY = 0; 
                velocityY = 0; 
            }
            syomaEl.style.bottom = `calc(20vh + ${syomaY}px)`;

            if (!isFinishing) {
                distance += gameSpeed;
                // Более плавное ускорение
                gameSpeed += 0.0008; 
            }

            // 2. Спавн препятствий - БОЛЬШЕ ПРЕПЯТСТВИЙ
            // Спавним препятствия почти до самой Вики
            if (distance < finishDistance * vikaAppearDist && !isFinishing) {
                spawnTimer++;
                // Уменьшили время между препятствиями для большей сложности
                if (spawnTimer > 80 + Math.random() * 40) {
                    const obs = document.createElement('div');
                    obs.className = 'obstacle';
                    // Добавили больше вариаций
                    obs.innerText = ['🌵','🪨','🌵','🪨','🪵'][Math.floor(Math.random()*5)];
                    obs.style.left = gameArea.offsetWidth + 'px';
                    gameArea.appendChild(obs);
                    spawnTimer = 0;
                }
            }

            // 3. Движение препятствий и проверка столкновений
            let hit = false;
            const syomaRect = syomaInner.getBoundingClientRect();

            document.querySelectorAll('.obstacle').forEach(obs => {
                let currentLeft = parseFloat(obs.style.left);
                currentLeft -= gameSpeed;
                obs.style.left = currentLeft + 'px';

                const obsRect = obs.getBoundingClientRect();
                if (
                    syomaRect.right - 20 > obsRect.left &&
                    syomaRect.left + 20 < obsRect.right &&
                    syomaRect.bottom > obsRect.top + 15
                ) {
                    hit = true;
                }

                if (currentLeft < -60) obs.remove();
            });

            if (hit && !isFinishing) {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                gameActive = false;
                syomaInner.classList.remove('running');
                document.getElementById('instruction').innerText = "Ой! Попробуй еще раз ❤️";
                setTimeout(() => { if (overlay.style.display === 'flex') startGame(); }, 1500);
                return;
            }

            // 4. Финал! Сёма добегает до Вики БЛИЖЕ
            if (distance >= finishDistance * vikaAppearDist) {
                vikaEl.style.display = 'block';
                let vikaLeft = parseFloat(vikaEl.style.left) || gameArea.offsetWidth;
                
                // Вика выезжает и останавливается
                if (vikaLeft > gameArea.offsetWidth * 0.7) {
                    vikaEl.style.left = (vikaLeft - gameSpeed) + 'px';
                } else {
                    // Теперь Сёма бежит остаток пути к Вике
                    if (distance < finishDistance) {
                        distance += gameSpeed;
                    } else {
                        isFinishing = true;
                        // Сёма бежит к ней
                        let sRect = syomaEl.getBoundingClientRect();
                        let vRect = vikaEl.getBoundingClientRect();
                        
                        if (sRect.right < vRect.left + 12) {
                            syomaEl.style.left = (parseFloat(syomaEl.style.left || 10) + 3) + '%';
                        } else if (gameActive) {
                            gameActive = false; 
                            syomaInner.classList.remove('running');
                            document.getElementById('instruction').innerText = "НАКОНЕЦ-ТО ВМЕСТЕ! ❤️";
                            
                            // Наклоняются друг к другу для поцелуя
                            syomaInner.className = 'character lean-right';
                            vikaInner.className = 'character lean-left';

                            // Сердечко между ними
                            const miniHeart = document.createElement('div');
                            miniHeart.className = 'mini-heart';
                            miniHeart.innerText = '💗';
                            miniHeart.style.position = 'absolute';
                            miniHeart.style.left = (parseFloat(vikaEl.style.left) - 30) + 'px';
                            miniHeart.style.bottom = 'calc(20vh + 65px)';
                            miniHeart.style.fontSize = '40px';
                            miniHeart.style.zIndex = '5';
                            miniHeart.style.animation = 'miniHeartFly 1.2s ease-out forwards';
                            gameArea.appendChild(miniHeart);

                            setTimeout(() => {
                                stopGame();
                                sendKiss();
                                try { tg.sendData("Сёма преодолел все преграды и поцеловал Вику! 🏃‍♂️❤️👩🏻"); } catch(e){}
                            }, 1600);
                            return;
                        }
                    }
                }
            }

            reqId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
